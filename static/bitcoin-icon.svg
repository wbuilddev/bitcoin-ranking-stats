<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
    <defs>
        <linearGradient id="bitcoinGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#f7931a;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#ff6b00;stop-opacity:1" />
        </linearGradient>
        <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
            <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
        </filter>
    </defs>
    
    <!-- Outer circle -->
    <circle cx="50" cy="50" r="45" fill="url(#bitcoinGradient)" filter="url(#shadow)" stroke="#fff" stroke-width="2"/>
    
    <!-- Bitcoin B symbol -->
    <g transform="translate(50, 50)">
        <!-- Left vertical bar -->
        <rect x="-15" y="-25" width="4" height="50" fill="#fff"/>
        
        <!-- Top horizontal bar -->
        <rect x="-11" y="-25" width="22" height="4" fill="#fff" rx="2"/>
        
        <!-- Middle horizontal bar -->
        <rect x="-11" y="-2" width="20" height="4" fill="#fff" rx="2"/>
        
        <!-- Bottom horizontal bar -->
        <rect x="-11" y="21" width="22" height="4" fill="#fff" rx="2"/>
        
        <!-- Top curve -->
        <path d="M 11 -21 Q 18 -21 18 -14 Q 18 -7 11 -7 L -11 -7 L -11 -21 Z" fill="#fff"/>
        
        <!-- Bottom curve -->
        <path d="M 9 2 Q 16 2 16 9 Q 16 17 9 17 L -11 17 L -11 2 Z" fill="#fff"/>
        
        <!-- Vertical lines through B -->
        <rect x="-5" y="-30" width="2" height="10" fill="#fff"/>
        <rect x="-1" y="-30" width="2" height="10" fill="#fff"/>
        <rect x="-5" y="20" width="2" height="10" fill="#fff"/>
        <rect x="-1" y="20" width="2" height="10" fill="#fff"/>
    </g>
    
    <!-- Inner circle for depth -->
    <circle cx="50" cy="50" r="38" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
</svg>
